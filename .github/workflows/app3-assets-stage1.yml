name: App3 Assets Stage 1

on:
  push:
    branches: ["App3"]
    paths:
      - ".github/workflows/app3-assets-stage1.yml"
      - "scripts/app3_assets_stage1.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  implement:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout App3
        uses: actions/checkout@v4
        with:
          ref: App3
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Implement asset master stage 1
        run: python3 scripts/app3_assets_stage1.py

      - name: Build App3 debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Commit verified changes to App3 only
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main app/schemas 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No application changes to commit"
            exit 1
          fi

          git commit -m "feat(assets): complete core asset master stage 1"
          git push origin HEAD:App3

      - name: Upload App3 APK
        uses: actions/upload-artifact@v4
        with:
          name: App3-assets-stage1-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
