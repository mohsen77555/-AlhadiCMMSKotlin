name: App2 UI Reorganization Patch

on:
  workflow_dispatch:
  push:
    branches: [App2]

permissions:
  contents: write

jobs:
  patch-ui:
    if: github.ref == 'refs/heads/App2'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout App2
        uses: actions/checkout@v4
        with:
          ref: App2

      - name: Apply grouped More screen UI patch
        run: python3 scripts/app2_ui_reorg.py

      - name: Commit and push UI patch
        run: |
          if git diff --quiet; then
            echo "No UI changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/com/alhadi/cmms/ui/CmmsApp.kt
          git commit -m "ui(app2): group More screen modules"
          git push origin HEAD:App2
