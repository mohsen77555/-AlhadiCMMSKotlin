name: Build Android APK

on:
  push:
    branches: [ main, master, App2, "claude/**" ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Apply App2 implementation patches
        if: github.ref == 'refs/heads/App2'
        run: |
          if [ -f scripts/app2_ui_reorg.py ]; then
            python3 scripts/app2_ui_reorg.py
          fi
          if [ -f scripts/app2_stages_11_15.py ]; then
            python3 scripts/app2_stages_11_15.py
          fi
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add app/src/main/java/com/alhadi/cmms/data/CmmsRepository.kt
            git add app/src/main/java/com/alhadi/cmms/ui/Forms.kt
            git add app/src/main/java/com/alhadi/cmms/ui/CmmsApp.kt
            git commit -m "feat(app2): implement governed asset stages 11-15"
            git push origin HEAD:App2
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.13'

      - name: Run unit tests
        run: gradle testDebugUnitTest --no-daemon --stacktrace

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Alhadi-CMMS-debug-apk
          path: app/build/outputs/apk/debug/*.apk
