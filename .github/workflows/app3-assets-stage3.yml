name: App3 Assets Stage 4

on:
  push:
    branches: ["App3"]
    paths:
      - ".github/workflows/app3-assets-stage3.yml"
      - "scripts/app3_assets_stage4_data.py"
      - "scripts/app3_assets_stage4_ui.py"
      - "scripts/app3_assets_stage4_ui_fix.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  implement:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout App3
        uses: actions/checkout@v4
        with:
          ref: App3
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Apply, verify and publish stage 4
        shell: bash
        run: |
          set +e
          python3 scripts/app3_assets_stage4_data.py > stage4-data.log 2>&1
          data_status=$?

          ui_status=99
          build_status=99
          if [ "$data_status" -eq 0 ]; then
            python3 scripts/app3_assets_stage4_ui_fix.py > stage4-fix.log 2>&1
            fix_status=$?
            if [ "$fix_status" -eq 0 ]; then
              python3 scripts/app3_assets_stage4_ui.py > stage4-ui.log 2>&1
              ui_status=$?
            else
              cat stage4-fix.log > stage4-ui.log
              ui_status=$fix_status
            fi
          else
            echo "UI patch was not started because the data patch failed." > stage4-ui.log
          fi

          if [ "$data_status" -eq 0 ] && [ "$ui_status" -eq 0 ]; then
            gradle assembleDebug --no-daemon --stacktrace > stage4-build.log 2>&1
            build_status=$?
          else
            echo "Build was not started because a patch step failed." > stage4-build.log
          fi

          cat stage4-data.log
          cat stage4-ui.log
          tail -n 200 stage4-build.log

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ "$data_status" -ne 0 ] || [ "$ui_status" -ne 0 ] || [ "$build_status" -ne 0 ]; then
            {
              echo "Stage 4 diagnostics"
              echo "data_status=$data_status"
              echo "ui_status=$ui_status"
              echo "build_status=$build_status"
              echo
              echo "--- data patch ---"
              tail -n 120 stage4-data.log
              echo
              echo "--- UI patch ---"
              tail -n 120 stage4-ui.log
              echo
              echo "--- build ---"
              tail -n 220 stage4-build.log
            } > stage4-status.txt
            git add stage4-status.txt
            git commit -m "chore(app3): record stage 4 diagnostics [skip ci]" || true
            git push origin HEAD:App3
            exit 1
          fi

          rm -f stage4-data.log stage4-fix.log stage4-ui.log stage4-build.log
          git rm -f stage4-status.txt 2>/dev/null || true
          git add app/src/main app/schemas
          if git diff --cached --quiet; then
            echo "No application changes to commit"
            exit 1
          fi
          git commit -m "feat(assets): add structured maintenance component lists"
          git push origin HEAD:App3

      - name: Upload App3 APK
        uses: actions/upload-artifact@v4
        with:
          name: App3-assets-stage4-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
